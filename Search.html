<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - GO RESORT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #fff; color: #222; }
        header { width: 100%; background: #fff; padding: 18px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .logo h4 { color: rgb(34, 174, 76); font-size: 28px; font-weight: bold; }
        nav { display: flex; gap: 35px; font-size: 18px; }
        a { text-decoration: none; color: inherit; }

        .container { padding: 40px 50px; max-width: 1400px; margin: 0 auto; }
        .results-header { margin-bottom: 30px; }
        h1 { font-size: 32px; margin-bottom: 10px; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .details { padding: 18px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
        .location { color: #666; margin-bottom: 8px; }
        .price { font-weight: bold; font-size: 18px; color: #ef5b67; }
        
        .no-results { grid-column: 1/-1; text-align: center; padding: 100px; font-size: 20px; color: #666; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="Go resort1.html"><h4>GO RESORT</h4></a></div>
        <nav>
            <a href="Destinations.html">Destinations</a>
            <a href="Stays.html">Stays</a>
            <a href="Experiences.html">Experiences</a>
            <a href="Events.html">Events</a>
            <a href="Blog.html">Blog</a>
        </nav>
        <div class="right-menu">
            <a href="Host.html">Host your place</a>
            <div>₹</div><div>👤</div>
        </div>
    </header>

    <div class="container">
        <div class="results-header">
            <h1 id="results-title">Finding the best resorts for you...</h1>
            <p id="results-count"></p>
        </div>
        
        <div class="grid" id="results-grid">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function performSearch() {
            const urlParams = new URLSearchParams(window.location.search);
            const destination = urlParams.get('destination') || '';
            const guests = urlParams.get('guests') || '';
            
            document.getElementById('results-title').innerText = `Results for "${destination || 'Everywhere'}"`;
            
            const grid = document.getElementById('results-grid');
            
            try {
                // Build search query
                const searchParams = new URLSearchParams({
                    destination: destination,
                    guests: guests
                });
                
                const response = await fetch(`${API_URL}/search?${searchParams.toString()}`);
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    document.getElementById('results-count').innerText = `${data.total} properties found`;
                    grid.innerHTML = data.data.map(prop => `
                        <div class="card">
                            <img src="${prop.images[0]?.url || 'https://images.unsplash.com/photo-1564013799919-ab600027ffc6'}" alt="${prop.title}">
                            <div class="details">
                                <div class="title">${prop.title}</div>
                                <div class="location">${prop.location.city}, ${prop.location.country}</div>
                                <div class="price">₹${prop.pricePerNight.toLocaleString()} / night</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div class="no-results">🏝️ No resorts found matching your criteria. Try different dates or locations!</div>';
                }
            } catch (error) {
                grid.innerHTML = '<div class="no-results" style="color: red;">⚠️ Unable to connect to server. Make sure the backend is running.</div>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', performSearch);
    </script>
</body>
</html>
