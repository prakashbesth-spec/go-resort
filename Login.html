<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - GO RESORT</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f7f7f7; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: #ef5b67; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #d74b57; }
        .switch { margin-top: 20px; font-size: 14px; color: #666; }
        .switch a { color: #222; font-weight: bold; text-decoration: none; }
        .logo { color: #22ae4c; font-weight: bold; font-size: 24px; margin-bottom: 20px; display: block; text-decoration: none; }
        .error-msg { color: #ef5b67; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="Go resort1.html" class="logo">GO RESORT</a>
        <h1>Welcome Back</h1>
        <div id="error" class="error-msg"></div>
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button class="btn" id="login-btn">Log in</button>
        <div class="switch">Don't have an account? <a href="Signup.html">Sign up</a></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.innerText = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Store token in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.user.name);
                    
                    window.location.href = 'Go resort1.html';
                } else {
                    errorDiv.innerText = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server error. Is the backend running?';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
