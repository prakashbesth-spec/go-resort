<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - GO RESORT</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f7f7f7; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: #ef5b67; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #d74b57; }
        .switch { margin-top: 20px; font-size: 14px; color: #666; }
        .switch a { color: #222; font-weight: bold; text-decoration: none; }
        .logo { color: #22ae4c; font-weight: bold; font-size: 24px; margin-bottom: 20px; display: block; text-decoration: none; }
        .error-msg { color: #ef5b67; font-size: 14px; margin-bottom: 15px; display: none; }
        .success-msg { color: #22ae4c; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="Go resort1.html" class="logo">GO RESORT</a>
        <h1>Create Account</h1>
        <div id="error" class="error-msg"></div>
        <div id="success" class="success-msg"></div>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button class="btn" id="signup-btn">Sign up</button>
        <div class="switch">Already have an account? <a href="Login.html">Log in</a></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!name || !email || !password) {
                errorDiv.innerText = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role: 'guest' })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.innerText = 'Account created! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => window.location.href = 'Login.html', 2000);
                } else {
                    errorDiv.innerText = data.error || 'Signup failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server error. Is the backend running?';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
